name: Tag and Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: main

  build-and-push:
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: latest
            server_names: cloudflare
          - variant: security
            server_names: cloudflare-security
          - variant: family
            server_names: cloudflare-family

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          VERSION=${{ needs.tag.outputs.new_version }}
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/pihole-dns-over-https
          VARIANT=${{ matrix.variant }}

          if [ "$VARIANT" = "latest" ]; then
            TAGS="${IMAGE}:latest,${IMAGE}:${VERSION}"
          else
            TAGS="${IMAGE}:${VARIANT},${IMAGE}:${VARIANT}-${VERSION}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            DNSCRYPT_SERVER_NAMES=${{ matrix.server_names }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
